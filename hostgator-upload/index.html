<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge Platform — All American CG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
iframe {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  display: block;
}
#loading {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  z-index: 999;
  transition: opacity 0.4s ease;
}
.logo { font-size: 2rem; font-weight: 800; color: #dc2626; margin-bottom: 1rem; letter-spacing: -1px; }
.logo span { color: #fff; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #333;
  border-top-color: #dc2626;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sub { margin-top: 1rem; color: #666; font-size: 0.85rem; }
</style>
</head>
<body>
<div id="loading">
  <div class="logo">Iron<span>Forge</span></div>
  <div class="spinner"></div>
  <div class="sub">Loading platform…</div>
</div>
<iframe
  id="platform"
  src="https://web-production-b2192.up.railway.app/"
  onload="document.getElementById('loading').style.opacity='0'; setTimeout(()=>document.getElementById('loading').style.display='none',400);"
  allow="fullscreen"
  title="IronForge Platform">
</iframe>
</body>
</html>
